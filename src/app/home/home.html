<!-- Home Carousel -->

<div id="homeCarousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-indicators">
        <button data-bs-target="#homeCarousel" data-bs-slide-to="0" class="active"></button>
        <button data-bs-target="#homeCarousel" data-bs-slide-to="1"></button>
        <button data-bs-target="#homeCarousel" data-bs-slide-to="2"></button>
    </div>

    <!-- image slides -->
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="images/homeslide1.jpg" class="w-100" alt="Slide 1">
        </div>

        <div class="carousel-item">
            <img src="images/homeslide2.jpg" class="w-100" alt="Slide 2">
        </div>

        <div class="carousel-item">
            <img src="images/homeslide3.jpg" class="w-100" alt="Slide 3">
        </div>

    </div>

    <!-- arrows -->
    <button class="carousel-control-prev" data-bs-target="#homeCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" data-bs-target="#homeCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>
