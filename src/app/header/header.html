
<!-- logo + contact info + donate button + date -->
<div class="top-section px-4 py-3">
  <div class="container d-flex justify-content-between align-items-center">


     <!-- left side = image and uva name -->
    <div class="d-flex align-items-center gap-3">

        <a routerLink="/">
            <img src="images/uva-logo.jpg" height="80" alt="UVA Logo">
        </a>
      
      <div>
        <h1 class="org-name mb-0">United Volunteers Association</h1>
      </div>
    </div>


    <!-- right side = date, contact info, donate button -->
    <div class="text-end">
      <p class="date mb-2"> <em>{{ today | date:'EEEE d-MMMM-yyyy' }}</em></p>
      <div class="d-flex align-items-center justify-content-end gap-3">
        <div class="contact-info text-end">
          <p class="mb-0">
            support@uvassociation.org
          </p>
        </div>
        <a routerLink="/donate" class="btn btn-donate px-4 py-2">Donate Now</a>
      </div>
    </div>

  </div>
</div>
